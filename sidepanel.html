<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Sidebar Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      color: var(--text-color);
      background: var(--bg-color);
    }

    /* 颜色主题变量 */
    :root {
      /* Light Theme - Default */
      --bg-color: #ffffff;
      --header-bg: #f8f9fa;
      --input-bg: #f8f9fa;
      --border-color: #e0e0e0;
      --text-color: #212529;
      --text-secondary: #6c757d;
      --user-msg-bg: #e9f7ff;
      --user-msg-color: #0d6efd;
      --assistant-msg-bg: #f0f2f5;
      --assistant-msg-color: #212529;
      --btn-primary-bg: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%);
      --btn-primary-text: white;
      --btn-secondary-bg: #e9ecef;
      --btn-secondary-text: #495057;
      --highlight: #0d6efd;
    }

    [data-theme="dark"] {
      --bg-color: #1a1a2e;
      --header-bg: #16213e;
      --input-bg: #16213e;
      --border-color: #2d2d44;
      --text-color: #f0f0f0;
      --text-secondary: #aaa;
      --user-msg-bg: #2d3748;
      --user-msg-color: #e9f7ff;
      --assistant-msg-bg: #1e2a3a;
      --assistant-msg-color: #f0f0f0;
      --btn-primary-bg: linear-gradient(135deg, #4a6cf7 0%, #3d5afe 100%);
      --btn-primary-text: white;
      --btn-secondary-bg: #2d3748;
      --btn-secondary-text: #aaa;
      --highlight: #4a6cf7;
      --theme-btn-bg: #2d3748;
    }

    [data-theme="gradient"] {
      --bg-color: #ffffff;
      --header-bg: #f8f9fa;
      --input-bg: #f8f9fa;
      --border-color: #e0e0e0;
      --text-color: #212529;
      --text-secondary: #6c757d;
      --user-msg-bg: #ffe5f0;
      --user-msg-color: #e94560;
      --assistant-msg-bg: #f0f2f5;
      --assistant-msg-color: #212529;
      --btn-primary-bg: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
      --btn-primary-text: white;
      --btn-secondary-bg: #e9ecef;
      --btn-secondary-text: #495057;
      --highlight: #e94560;
      --theme-btn-bg: #e9ecef;
    }

    [data-theme="minimal"] {
      --bg-color: #fafafa;
      --header-bg: #fafafa;
      --input-bg: #fafafa;
      --border-color: #e0e0e0;
      --text-color: #212529;
      --text-secondary: #6c757d;
      --user-msg-bg: #e7f3ff;
      --user-msg-color: #0d6efd;
      --assistant-msg-bg: #ffffff;
      --assistant-msg-color: #212529;
      --btn-primary-bg: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%);
      --btn-primary-text: white;
      --btn-secondary-bg: transparent;
      --btn-secondary-text: #6c757d;
      --highlight: #0d6efd;
      --theme-btn-bg: #fafafa;
    }

    /* 头部 */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: var(--header-bg);
      border-bottom: 1px solid var(--border-color);
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-color);
      letter-spacing: -0.5px;
    }

    .settings-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: background 0.2s;
      font-size: 12px;
      font-weight: 600;
      width: 32px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .settings-btn:hover {
      background: var(--border-color);
    }

    /* 聊天区域 */
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message {
      max-width: 85%;
      padding: 10px 12px;
      border-radius: 10px;
      line-height: 1.7;
      font-size: 14px;
      transition: transform 0.2s;
      word-wrap: break-word;
    }

    .message.assistant p,
    .message.user p {
      margin: 0.5em 0;
    }

    .message.assistant p:first-child {
      margin-top: 0;
    }

    .message.assistant p:last-child {
      margin-bottom: 0;
    }

    .message.assistant code {
      background: rgba(0, 0, 0, 0.08);
      padding: 2px 6px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
      font-size: 0.9em;
    }

    [data-theme="dark"] .message.assistant code {
      background: rgba(255, 255, 255, 0.12);
    }

    .message.assistant pre {
      background: #f6f8fa;
      padding: 12px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 8px 0;
    }

    [data-theme="dark"] .message.assistant pre {
      background: #1e1e2e;
    }

    .message.assistant pre code {
      background: transparent;
      padding: 0;
    }

    .message.assistant strong {
      font-weight: 600;
      color: var(--highlight);
    }

    .message.assistant ul,
    .message.assistant ol {
      margin: 8px 0;
      padding-left: 20px;
    }

    .message.assistant li {
      margin: 4px 0;
    }

    .message.assistant h1,
    .message.assistant h2,
    .message.assistant h3 {
      margin: 12px 0 8px;
      font-weight: 600;
    }

    .message.assistant h1 { font-size: 1.3em; }
    .message.assistant h2 { font-size: 1.15em; }
    .message.assistant h3 { font-size: 1em; }

    .message.user {
      align-self: flex-end;
      background: var(--user-msg-bg);
      color: var(--user-msg-color);
      border-bottom-right-radius: 6px;
    }

    .message.assistant {
      align-self: flex-start;
      background: var(--assistant-msg-bg);
      color: var(--assistant-msg-color);
      border-bottom-left-radius: 6px;
    }

    .message.system {
      align-self: center;
      background: transparent;
      color: var(--text-secondary);
      font-size: 11px;
      padding: 6px 0;
      text-align: center;
    }

    .message.error {
      background: #ffe5e5;
      color: #dc3545;
    }

    /* 输入区域 */
    .input-container {
      padding: 10px 12px;
      background: var(--input-bg);
      border-top: 1px solid var(--border-color);
    }

    .input-wrapper {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text-color);
      font-size: 13px;
      resize: none;
      max-height: 120px;
      min-height: 36px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--highlight);
      box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.1);
    }

    textarea::placeholder {
      color: var(--text-secondary);
      opacity: 1;
    }

    .send-btn {
      width: 36px;
      height: 36px;
      background: var(--btn-primary-bg);
      border: none;
      border-radius: 8px;
      color: var(--btn-primary-text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .send-btn:hover {
      transform: scale(1.08);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* 停止按钮 */
    .stop-btn {
      width: 36px;
      height: 36px;
      background: #dc3545;
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s;
    }

    .stop-btn:hover {
      transform: scale(1.08);
      background: #c82333;
    }

    /* 加载动画 */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 8px 12px;
    }

    .typing-indicator span {
      width: 6px;
      height: 6px;
      background: var(--highlight);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    /* 快捷操作按钮 */
    .quick-actions {
      display: flex;
      gap: 6px;
      padding: 8px 12px;
      background: var(--input-bg);
      border-bottom: 1px solid var(--border-color);
    }

    .quick-btn {
      flex: 1;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 6px;
      color: var(--text-secondary);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-btn:hover {
      background: var(--border-color);
      color: var(--highlight);
      border-color: var(--highlight);
    }

    .quick-btn.active {
      background: var(--highlight);
      color: white;
      border-color: var(--highlight);
    }

    /* 设置面板 */
    .settings-panel {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg-color);
      padding: 16px;
      display: none;
      flex-direction: column;
      z-index: 100;
    }

    .settings-panel.active {
      display: flex;
    }

    .settings-panel h2 {
      font-size: 16px;
      margin-bottom: 16px;
      color: var(--text-color);
      font-weight: 600;
    }

    .form-group {
      margin-bottom: 14px;
    }

    .form-group label {
      display: block;
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 8px 12px;
      color: var(--text-color);
      font-size: 13px;
    }

    .form-group textarea {
      resize: vertical;
      min-height: 60px;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--highlight);
      box-shadow: 0 0 0 2px rgba(13, 110, 253, 0.1);
    }

    .btn-primary {
      background: var(--btn-primary-bg);
      border: none;
      border-radius: 6px;
      padding: 10px 20px;
      color: var(--btn-primary-text);
      font-size: 13px;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
    }

    .btn-secondary {
      background: var(--theme-btn-bg);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 10px 20px;
      color: var(--btn-secondary-text);
      font-size: 13px;
      cursor: pointer;
      margin-top: 10px;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: var(--highlight);
      color: white;
    }

    .btn-secondary.active {
      background: var(--highlight);
      color: white;
    }

    .close-settings {
      position: absolute;
      top: 12px;
      right: 12px;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      border-radius: 4px;
    }

    .close-settings:hover {
      background: var(--border-color);
      color: var(--text-color);
    }

    /* 预设按钮样式 */
    .preset-btn {
      flex-shrink: 0;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 AI Chat</h1>
    <button class="settings-btn" id="settingsBtn">⚙️</button>
  </div>

  <div class="chat-container" id="chatContainer">
    <div class="message system">
      💡 选中文本后点击工具栏的 ❓ 解释 或 💬 对话 按钮，开启深度对话
    </div>
  </div>

  <div class="quick-actions" id="quickActions">
    <button class="quick-btn" data-action="translate">翻译</button>
    <button class="quick-btn" data-action="explain">解释</button>
    <button class="quick-btn" data-action="summarize">总结</button>
    <button class="quick-btn" data-action="rewrite">润色</button>
  </div>

  <div class="input-container">
    <div class="input-wrapper">
      <textarea id="messageInput" placeholder="输入消息... (Shift+Enter 换行)" rows="1"></textarea>
      <button class="send-btn" id="sendBtn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
        </svg>
      </button>
      <button class="stop-btn" id="stopBtn" style="display: none;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <rect x="6" y="6" width="12" height="12" rx="2"></rect>
        </svg>
      </button>
    </div>
  </div>

  <!-- 设置面板 -->
  <div class="settings-panel" id="settingsPanel">
    <button class="close-settings" id="closeSettings">&times;</button>
    <h2>⚙️ 配置</h2>

    <div class="form-group">
      <label>主题配色</label>
      <div style="display: flex; gap: 8px; margin-top: 6px;">
        <button class="btn-secondary" data-theme="light">☀️ 浅色</button>
        <button class="btn-secondary" data-theme="dark">🌙 深色</button>
        <button class="btn-secondary" data-theme="gradient">🎨 渐变</button>
        <button class="btn-secondary" data-theme="minimal">⚪ 极简</button>
      </div>
    </div>

    <!-- 模型预设选项卡 -->
    <div class="form-group">
      <label>模型配置</label>
      <div style="display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap;">
        <button class="btn-secondary preset-btn active" data-preset="ollama">🦙 Ollama</button>
        <button class="btn-secondary preset-btn" data-preset="deepseek">🚀 DeepSeek</button>
        <button class="btn-secondary preset-btn" data-preset="glm">💬 GLM</button>
        <button class="btn-secondary preset-btn" data-preset="qwen">🤖 Qwen</button>
        <button class="btn-secondary preset-btn" data-preset="qwenCode">💻 Qwen Code</button>
        <button class="btn-secondary preset-btn" data-preset="openai">🌐 OpenAI</button>
        <button class="btn-secondary preset-btn" data-preset="custom">✏️ 自定义</button>
      </div>
    </div>

    <div class="form-group preset-config">
      <label>API Endpoint</label>
      <input type="text" id="apiEndpoint" placeholder="例如：http://localhost:11434/v1">
    </div>

    <div class="form-group preset-config">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="输入你的 API 密钥（本地模型可留空）">
    </div>

    <div class="form-group preset-config">
      <label>模型名称</label>
      <input type="text" id="model" placeholder="例如：llama3">
    </div>

    <div class="form-group preset-config">
      <label>系统提示词</label>
      <textarea id="systemPrompt" placeholder="你是..."></textarea>
    </div>

    <button class="btn-primary" id="saveSettings">💾 保存配置</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
